<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Blog</title>
    <link rel="stylesheet" href="/main.77a9bc14.css">
  </head>

  <body>
    <!-- ── Header ─────────────────────────────── -->
    <header>
      <div class="header-inner">
        <div class="header-brand">
          <h1>My Personal <span>Blog</span></h1>
          <p>Thoughts, stories, and ideas worth sharing.</p>
        </div>

        <div class="header-controls">
          <!-- Font Size Controls -->
          <div class="font-controls">
            <span>Size:</span>
            <button id="font-small">A</button>
            <button id="font-medium">A</button>
            <button id="font-large">A</button>
          </div>

          <!-- Dark Mode Toggle -->
          <div class="theme-toggle">
            <label>
              <input type="checkbox" id="darkModeToggle">
              Dark
            </label>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Navigation ─────────────────────────── -->
    <nav>
      <div class="nav-inner">
        <a href="/main.html" class="active">Home</a>
        <a href="/about.html">About</a>
        <a href="/posts.html">Posts</a>
        <a href="/contact.html">Contact</a>
        <a href="#" id="logout-link">Logout</a>
      </div>
    </nav>

    <!-- ── Page Content ───────────────────────── -->
    <div class="page-wrapper">
      <div class="main-layout">

        <!-- ── Main Column ──────────────────── -->
        <main>
          <!-- Featured Post -->
          <section>
            <h2>Featured</h2>
            <article id="featured-post"></article>
          </section>

          <hr>

          <!-- Recent Posts -->
          <section>
            <h2>
              Recent Posts
              <button id="refresh-posts" style="margin-left: auto; padding: .3rem .8rem; font-size: .65rem">
                ↺ Refresh
              </button>
            </h2>
            <div id="posts-container"></div>
          </section>
        </main>

        <!-- ── Sidebar ───────────────────────── -->
        <aside id="user-profile-container">
          <h2>Profile</h2>
          <div id="user-profile"></div>
        </aside>

      </div>
    </div>

    <!-- ── Footer ─────────────────────────────── -->
    <footer>
      <p>© 2025 My Personal Blog. All rights reserved.</p>
      <nav>
        <a href="/main.html">Home</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
      </nav>
    </footer>

    <!-- ── Scripts ────────────────────────────── -->
    <script src="/main.0eaae06d.js"></script>
    <script src="/main.05da1fe0.js"></script>
    <script src="/main.33901292.js"></script>
    <script src="/main.a3952d97.js"></script>
    <script src="/main.aa69868b.js"></script>
    <script src="/main.3bb0576c.js"></script>
    <script src="/main.2315b9a3.js"></script>
    <script src="/main.fdd36c6d.js"></script>
  
<script src="/main.3d7050a9.js"></script></body></html>
