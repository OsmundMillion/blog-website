<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Personal Blog</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <!-- ── Header ─────────────────────────────── -->
    <header>
      <div class="header-inner">
        <div class="header-brand">
          <h1>My Personal <span>Blog</span></h1>
          <p>Thoughts, stories, and ideas worth sharing.</p>
        </div>

        <div class="header-controls">
          <!-- Font Size Controls -->
          <div class="font-controls">
            <span>Size:</span>
            <button id="font-small">A</button>
            <button id="font-medium">A</button>
            <button id="font-large">A</button>
          </div>

          <!-- Dark Mode Toggle -->
          <div class="theme-toggle">
            <label>
              <input type="checkbox" id="darkModeToggle" />
              Dark
            </label>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Navigation ─────────────────────────── -->
    <nav>
      <div class="nav-inner">
        <a href="main.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="posts.html">Posts</a>
        <a href="contact.html">Contact</a>
        <a href="#" id="logout-link">Logout</a>
      </div>
    </nav>

    <!-- ── Page Content ───────────────────────── -->
    <div class="page-wrapper">
      <div class="main-layout">

        <!-- ── Main Column ──────────────────── -->
        <main>
          <!-- Featured Post -->
          <section>
            <h2>Featured</h2>
            <article id="featured-post"></article>
          </section>

          <hr />

          <!-- Recent Posts -->
          <section>
            <h2>
              Recent Posts
              <button id="refresh-posts" style="margin-left: auto; font-size: 0.65rem; padding: 0.3rem 0.8rem;">
                ↺ Refresh
              </button>
            </h2>
            <div id="posts-container"></div>
          </section>
        </main>

        <!-- ── Sidebar ───────────────────────── -->
        <aside id="user-profile-container">
          <h2>Profile</h2>
          <div id="user-profile"></div>
        </aside>

      </div>
    </div>

    <!-- ── Footer ─────────────────────────────── -->
    <footer>
      <p>&copy; 2025 My Personal Blog. All rights reserved.</p>
      <nav>
        <a href="main.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </footer>

    <!-- ── Scripts ────────────────────────────── -->
    <script src="../js/store.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/blog.js"></script>
    <script src="../js/comments.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/font-controls.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
