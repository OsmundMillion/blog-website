<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | My Personal Blog</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body class="error-page">

    <!-- ── Brand mark ─────────────────────────── -->
    <div class="auth-brand">
      <a href="main.html">My Personal <strong>Blog</strong></a>
    </div>

    <!-- ── Dark mode toggle ────────────────────── -->
    <div class="auth-theme-toggle">
      <div class="theme-toggle">
        <label>
          <input type="checkbox" id="darkModeToggle" />
          Dark
        </label>
      </div>
    </div>

    <!-- ── 404 Card ────────────────────────────── -->
    <div class="auth-card error-card">

      <div class="auth-card-header">
        <span class="section-label">Error 404</span>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist, was moved, or the URL was mistyped.</p>
      </div>

      <div class="error-actions">
        <a href="main.html" class="auth-submit">Back to Home</a>
        <a href="posts.html" class="btn-ghost">Browse Posts</a>
      </div>

    </div>

    <!-- ── Page footer ─────────────────────────── -->
    <footer class="auth-page-footer">
      <p>&copy; 2025 Osmund Million</p>
    </footer>

    <!-- ── Scripts ────────────────────────────── -->
    <script src="../js/store.js"></script>
    <script src="../js/main.js" defer></script>

  </body>
</html>
